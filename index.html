<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leopard Motors</title>
    <style>
        /* Apple System Typography & Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #000000;
            color: #f5f5f7;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Smooth Cross-Fading Background Slideshow */
        .bg-slideshow {
            position: absolute;
            top: -10px;
            left: -10px;
            width: calc(100% + 20px);
            height: calc(100% + 20px);
            z-index: 1;
            filter: blur(40px) brightness(0.5);
            pointer-events: none;
        }

        .bg-slide {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-size: cover;
            background-position: center;
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .bg-slide.active {
            opacity: 1;
        }

        /* Apple Glassmorphism Card Container */
        .container {
            position: relative;
            z-index: 10;
            width: 90%;
            max-width: 440px;
            background: rgba(22, 22, 23, 0.65);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 28px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            animation: cardEntrance 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes cardEntrance {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(10px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        /* Branding */
        .brand-title {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #86868b;
            margin-bottom: 8px;
        }

        h2 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 15px;
            color: #86868b;
            margin-bottom: 32px;
            line-height: 1.4;
        }

        /* Variant Option Grid */
        .variant-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        .variant-card {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 18px;
            padding: 20px 12px;
            text-decoration: none;
            color: #ffffff;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .variant-card:hover {
            background: rgba(255, 255, 255, 0.09);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
        }

        .variant-card:active {
            transform: translateY(-1px);
        }

        .variant-img {
            width: 100%;
            height: auto;
            max-height: 80px;
            object-fit: contain;
            margin-bottom: 12px;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.3));
        }

        .variant-name {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: -0.2px;
        }

        /* Apple Loading Spinner */
        .loader-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 24px;
            opacity: 0.7;
        }

        .loader {
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top: 2px solid #0071e3;
            border-radius: 50%;
            width: 16px;
            height: 16px;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader-text {
            font-size: 13px;
            color: #86868b;
        }
    </style>
    
    <meta http-equiv="refresh" content="3; url=gts/index.html">
</head>
<body>

    <!-- Smoothly transitioning blurred background -->
    <div class="bg-slideshow" id="slideshow">
        <div class="bg-slide active" style="background-image: url('img/2.png');"></div>
        <div class="bg-slide" style="background-image: url('img/3.png');"></div>
        <div class="bg-slide" style="background-image: url('img/8.png');"></div>
        <div class="bg-slide" style="background-image: url('img/4.png');"></div>
    </div>

    <!-- UI Card Container -->
    <div class="container">
        <div class="loader"></div>
        <h2>Redirecting...</h2>
        <p>Sorry for your slow wifi, LOL. Please wait a moment.</p>
        <p><a href="gts/index.html">Click here if you're not redirected.</a></p>
    </div>

    <script>
        // Automatic Background Engine
        const slides = document.querySelectorAll('.bg-slide');
        let currentSlide = 0;

        function nextSlide() {
            // Remove active status from current image
            slides[currentSlide].classList.remove('active');
            
            // Generate a random index different from the current one
            let nextSlideIndex;
            do {
                nextSlideIndex = Math.floor(Math.random() * slides.length);
            } while (nextSlideIndex === currentSlide);

            currentSlide = nextSlideIndex;
            
            // Fade in the new image
            slides[currentSlide].classList.add('active');
        }

        // Cycle background every 4 seconds
        setInterval(nextSlide, 4000);
    </script>
</body>
</html>
