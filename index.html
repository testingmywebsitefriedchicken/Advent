<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #ffffff;
            color: #1d1d1f;
            text-align: center;
            animation: fadeIn 1.5s ease-in;
        }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .container { max-width: 400px; }
        
        /* The Spinner */
        .loader {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #0071e3;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        a { color: #0071e3; text-decoration: none; font-weight: 500; }
        a:hover { text-decoration: underline; }
    </style>
    
    <meta http-equiv="refresh" content="3; url=GTS/index.html">
</head>
<body>
    <div class="container">
        <div class="loader"></div>
        <h2>Redirecting...</h2>
        <p>Sorry for your slow wifi, LOL. Please wait a moment.</p>
        <p><a href="GTS/index.html">Click here if you're not redirected.</a></p>
    </div>
</body>
</html>
