<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leopard Motors</title>
    <style>
        :root { 
            --bg-transition: opacity 2s ease-in-out; 
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            background: #38383800; 
            color: white;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Background Slider */
        #bg-container { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -2; 
        }
        
        .bg-slide { 
            position: absolute; 
            width: 100%; height: 100%; 
            background-size: cover; 
            background-position: center; 
            filter: blur(50px); /* Heavy 100% visual blur environment */
            opacity: 0; 
            transition: var(--bg-transition); 
            transform: scale(1.15); /* Prevents blurred edges from bleeding on any screen size */
        }
        
        .bg-slide.active { 
            opacity: 1; 
        }

        /* Loading Screen (Apple UI Style) */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* Main UI Card */
        .card {
            background: var(--glass-bg); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px; 
            border-radius: 32px; 
            border: var(--glass-border);
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.4);
            width: 90%;
            max-width: 540px;
            margin: 40px auto;
            box-sizing: border-box;
            z-index: 1;
        }

        h1 { 
            margin-top: 0;
            margin-bottom: 30px; 
            font-size: 2.2rem;
            font-weight: 600; 
            letter-spacing: -1px; 
        }

        /* Vehicle Buttons */
        .btn-container { 
            display: flex; 
            flex-direction: row;
            gap: 20px; 
            justify-content: center;
            margin-bottom: 35px;
        }

        .variant-btn {
            background: rgba(255, 255, 255, 0.05); 
            padding: 20px; 
            border-radius: 24px;
            cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            border: var(--glass-border); 
            flex: 1;
            max-width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
        }

        .variant-btn:hover { 
            background: rgba(255, 255, 255, 0.15); 
            transform: scale(1.04); 
        }

        .variant-btn img { 
            width: 100%; 
            height: auto; 
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .variant-title {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #fff;
        }

        /* Form Button */
        .action-btn {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px 40px;
            font-size: 1.05rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.3s ease, background 0.3s;
            width: 100%;
            max-width: 300px;
        }

        .action-btn:hover {
            transform: scale(1.03);
            background: #e0e0e0;
        }

        /* Footer Notification */
        .footer-notice {
            margin-bottom: 30px;
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--glass-border);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1;
            max-width: 90%;
        }

        /* Mobile Responsive Breakpoint */
        @media (max-width: 500px) {
            body, html {
                overflow-y: auto; /* Fallback for exceptionally small layout heights */
            }
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8rem;
                margin-bottom: 25px;
            }
            .btn-container {
                flex-direction: column; /* Stack buttons vertically on mobile */
                align-items: center;
                gap: 15px;
            }
            .variant-btn {
                width: 100%;
                max-width: 280px;
                flex-direction: row; /* Horizontal layout for variant elements on mobile */
                padding: 15px;
                gap: 20px;
            }
            .variant-btn img {
                width: 80px;
            }
            .variant-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="spinner"></div>
    </div>

    <div id="bg-container">
        <div class="bg-slide active" style="background-image: url('img/2.png');"></div>
        <div class="bg-slide" style="background-image: url('img/3.png');"></div>
        <div class="bg-slide" style="background-image: url('img/4.png');"></div>
        <div class="bg-slide" style="background-image: url('img/8.png');"></div>
    </div>

    <div class="card">
        <h1>Leopard Motors</h1>
        
        <div class="btn-container">
            <div class="variant-btn" onclick="navigateWithLoader('GTS/index.html')">
                <img src="img/gts.png" alt="GTS">
                <span class="variant-title">GTS</span>
            </div>
            
            <div class="variant-btn" onclick="navigateWithLoader('Ecobeast/index.html')">
                <img src="img/eco.png" alt="Ecobeast">
                <span class="variant-title">Ecobeast</span>
            </div>
        </div>

        <button class="action-btn" onclick="navigateWithLoader('https://docs.google.com/forms/d/e/1FAIpQLSft4gtBUl8l10hM1h9PtrTVIA1t-3PjyGEAuU3cN5UBlWb4DQ/viewform?usp=header')">
            Register Interest
        </button>
    </div>

    <div class="footer-notice">
        SUV, crossover and sedan is coming soon
    </div>

    <script>
        // Background Slider Logic (Configured precisely for 1-second loops)
        const slides = document.querySelectorAll('.bg-slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 2000); // Trigger transition changes at 2s intervals

        // Apple UI Style Navigation Loader
        function navigateWithLoader(url) {
            const loader = document.getElementById('loader-overlay');
            loader.classList.add('active');
            
            // Wait 1 second (1000ms), then redirect
            setTimeout(() => {
                window.location.href = url;
            }, 1000);
        }
    </script>
</body>
</html>
