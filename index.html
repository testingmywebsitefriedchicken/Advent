<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leopard Motors</title>
    <style>
        :root { 
            --bg-transition: opacity 2s ease-in-out; 
            --glass-bg: rgba(255, 255, 255, 0.08);
            --glass-border: 1px solid rgba(255, 255, 255, 0.15);
        }
        
        body, html { 
            margin: 0; 
            padding: 0; 
            min-height: 100vh;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, sans-serif; 
            background: #12121200; /* Darker fallback background */
            color: white;
            -webkit-font-smoothing: antialiased;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            box-sizing: border-box;
        }

        /* Background Slider */
        #bg-container { 
            position: fixed; 
            top: 0; left: 0; 
            width: 100%; height: 100%; 
            z-index: -2; 
            background: black; /* Pure black backing layer */
        }
        
        .bg-slide { 
            position: absolute; 
            width: 100%; height: 100%; 
            background-size: cover; 
            background-position: center; 
            /* Added brightness control here to make background images darker */
            filter: blur(50px) brightness(40%); 
            opacity: 0; 
            transition: var(--bg-transition); 
            transform: scale(1.15); /* Prevents blurred edges from bleeding on any screen size */
        }
        
        .bg-slide.active { 
            opacity: 1; 
        }

        /* Loading Screen (Apple UI Style) */
        #loader-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 9999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        #loader-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin { 
            100% { transform: rotate(360deg); } 
        }

        /* Apple System Alert Pop-up Style */
        #popup-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 10000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        }

        #popup-overlay.show {
            opacity: 1;
            pointer-events: all;
        }

        .apple-alert {
            background: rgba(30, 30, 30, 0.75);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 20px;
            width: 270px; /* Standard iOS System Alert Width */
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
            transform: scale(1.15);
            transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            overflow: hidden;
        }

        #popup-overlay.show .apple-alert {
            transform: scale(1);
        }

        .alert-content {
            padding: 20px 16px;
        }

        .alert-title {
            font-size: 17px;
            font-weight: 600;
            margin: 0 0 6px 0;
            letter-spacing: -0.4px;
        }

        .alert-message {
            font-size: 13px;
            font-weight: 400;
            line-height: 16px;
            margin: 0;
            color: rgba(255, 255, 255, 0.85);
            letter-spacing: -0.1px;
        }

        .alert-button {
            width: 100%;
            background: transparent;
            border: none;
            border-top: 0.5px solid rgba(255, 255, 255, 0.15);
            color: #0A84FF; /* Apple System Blue */
            padding: 12px 0;
            font-size: 17px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: -0.4px;
            outline: none;
            transition: background 0.2s;
        }

        .alert-button:active {
            background: rgba(255, 255, 255, 0.1);
        }

        /* Main UI Card */
        .card {
            background: var(--glass-bg); 
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            padding: 40px 30px; 
            border-radius: 32px; 
            border: var(--glass-border);
            text-align: center; 
            box-shadow: 0 30px 60px rgba(0,0,0,0.5); /* Slightly deeper shadow for contrast */
            width: 90%;
            max-width: 540px;
            margin: 40px auto;
            box-sizing: border-box;
            z-index: 1;
        }

        h1 { 
            margin-top: 0;
            margin-bottom: 30px; 
            font-size: 2.2rem;
            font-weight: 600; 
            letter-spacing: -1px; 
        }

        /* Vehicle Buttons */
        .btn-container { 
            display: flex; 
            flex-direction: row;
            gap: 20px; 
            justify-content: center;
            margin-bottom: 35px;
        }

        .variant-btn {
            background: rgba(68, 68, 68, 0.219); 
            padding: 20px; 
            border-radius: 24px;
            cursor: pointer; 
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), background 0.3s;
            border: var(--glass-border); 
            flex: 1;
            max-width: 220px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            box-sizing: border-box;
        }

        .variant-btn:hover { 
            background: rgba(255, 255, 255, 0.15); 
            transform: scale(1.04); 
        }

        /* Optimizations for high-res 720p image scaling */
        .variant-btn img { 
            width: 100%; 
            height: auto; 
            max-height: 120px; /* Limits high-res vertical stretching */
            object-fit: cover;  /* Keeps the aspect ratio crisp */
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        .variant-title {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.5px;
            color: #fff;
        }

        /* Footer Notification */
        .footer-notice {
            text-decoration: none;
            margin-bottom: 15px; /* Tighter margin for stacked notices */
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: var(--glass-border);
            padding: 12px 25px;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: rgba(255, 255, 255, 0.9);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-align: center;
            z-index: 1;
            max-width: 90%;
            transition: background 0.3s;
        }

        .footer-notice:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        /* Mobile Responsive Breakpoint */
        @media (max-width: 500px) {
            body, html {
                overflow-y: auto; 
            }
            .card {
                padding: 30px 20px;
            }
            h1 {
                font-size: 1.8rem;
                margin-bottom: 25px;
            }
            .btn-container {
                flex-direction: column; 
                align-items: center;
                gap: 15px;
            }
            .variant-btn {
                width: 100%;
                max-width: 280px;
                flex-direction: row; 
                padding: 15px;
                gap: 20px;
            }
            .variant-btn img {
                width: 80px;
                max-height: 80px;
            }
            .variant-title {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>

    <div id="loader-overlay">
        <div class="spinner"></div>
    </div>

    <!-- Apple UI Pop-Up Overlay -->
    <div id="popup-overlay">
        <div class="apple-alert">
            <div class="alert-content">
                <h2 class="alert-title">Showcase Notice</h2>
                <p class="alert-message">This website serves strictly as a project showcase for the Automation game. It is not an official commercial platform.</p>
            </div>
            <button class="alert-button" onclick="closeNotice()">Sige</button>
        </div>
    </div>

    <div id="bg-container">
        <div class="bg-slide active" style="background-image: url('img/2.png');"></div>
        <div class="bg-slide" style="background-image: url('img/3.png');"></div>
        <div class="bg-slide" style="background-image: url('img/8.png');"></div>
    </div>

    <div class="card">
        <h1>Leopard Motors</h1>
        <p>Choose your vehicle</p>
        <div class="btn-container">
            <div class="variant-btn" onclick="navigateWithLoader('GTS/index.html')">
                <img src="img/gts.png" alt="GTS">
                <span class="variant-title">GTS</span>
            </div>
            
            <div class="variant-btn" onclick="navigateWithLoader('Ecobeast/index.html')">
                <img src="img/eco.png" alt="Ecobeast">
                <span class="variant-title">Ecobeast</span>
            </div>
        </div>
    </div>

    <a class="footer-notice" href="https://store.steampowered.com/app/293760/Automation__The_Car_Company_Tycoon_Game/">
        Automation: The Car Company Tycoon Game
    </a>
    <a class="footer-notice" href="https://docs.google.com/forms/d/e/1FAIpQLSft4gtBUl8l10hM1h9PtrTVIA1t-3PjyGEAuU3cN5UBlWb4DQ/viewform?usp=header">
        Register Interest
    </a>
    

    <script>
        // Background Slider Logic
        const slides = document.querySelectorAll('.bg-slide');
        let current = 0;
        setInterval(() => {
            slides[current].classList.remove('active');
            current = (current + 1) % slides.length;
            slides[current].classList.add('active');
        }, 2000); 

        // Apple UI Style Navigation Loader
        function navigateWithLoader(url) {
            const loader = document.getElementById('loader-overlay');
            loader.classList.add('active');
            
            setTimeout(() => {
                window.location.href = url;
            }, 1000);
        }

        // Showcase Pop-up Session Logic
        window.addEventListener('DOMContentLoaded', () => {
            if (!sessionStorage.getItem('showcaseNoticeDismissed')) {
                // Subtle delay for transition elegance
                setTimeout(() => {
                    document.getElementById('popup-overlay').classList.add('show');
                }, 400);
            }
        });

        function closeNotice() {
            document.getElementById('popup-overlay').classList.remove('show');
            sessionStorage.setItem('showcaseNoticeDismissed', 'true');
        }
    </script>
</body>
</html>
